name: autobracket-staging

x-app-environment: &app-environment
  LOG_LEVEL: ${LOG_LEVEL:-info}
  NODE_ENV: production
  REDIS_URL: redis://redis:6379
  RELEASE_VERSION: ${RELEASE_VERSION:-staging-local}

x-app-build: &app-build
  context: .
  dockerfile: infra/docker/Dockerfile

services:
  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autobracket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:-autobracket}
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql
    networks: [backend]

  redis:
    image: redis:8.8.0-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - redis-data:/data
    networks: [backend]

  migrate:
    build:
      <<: *app-build
      target: migration
    environment:
      DATABASE_URL: ${STAGING_DATABASE_URL:?STAGING_DATABASE_URL is required}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [backend]

  web:
    build:
      <<: *app-build
      target: web
    init: true
    restart: unless-stopped
    environment:
      <<: *app-environment
      APP_URL: ${STAGING_PUBLIC_URL:-http://localhost:3100}
      DATABASE_URL: ${STAGING_DATABASE_URL:?STAGING_DATABASE_URL is required}
      PORT: 3000
      PUBLIC_URL: ${STAGING_PUBLIC_URL:-http://localhost:3100}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${STAGING_WEB_PORT:-3100}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks: [backend]

  realtime:
    build:
      <<: *app-build
      target: realtime
    init: true
    restart: unless-stopped
    environment:
      <<: *app-environment
      REALTIME_PORT: 3001
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${STAGING_REALTIME_PORT:-3101}:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks: [backend]

  worker:
    build:
      <<: *app-build
      target: worker
    init: true
    restart: unless-stopped
    environment:
      <<: *app-environment
      DATABASE_URL: ${STAGING_DATABASE_URL:?STAGING_DATABASE_URL is required}
      WORKER_HEALTH_PORT: 3002
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${STAGING_WORKER_PORT:-3102}:3002"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks: [backend]

networks:
  backend:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
